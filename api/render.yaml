services:
  - type: web
    name: lastecho-api
    runtime: docker
    rootDir: api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: LASTECHO_ADMIN_USER
        value: admin
      - key: LASTECHO_ADMIN_PASSWORD
        sync: false
      - key: LASTECHO_ADMIN_TOKEN
        sync: false
      - key: LASTECHO_CORS_ORIGINS
        sync: false
      # Render's free tier blocks outbound SMTP ports, so we deliver via
      # Postmark's HTTP API instead. Set LASTECHO_POSTMARK_TOKEN to your
      # Postmark Server API Token (Servers > LastEcho > API Tokens).
      - key: LASTECHO_POSTMARK_TOKEN
        sync: false
      - key: LASTECHO_SMTP_FROM
        value: sg58912333@edu.mon.bg
      # Draft the outreach queue once per boot. The dataset only changes ~yearly,
      # and on the free tier the SQLite DB is ephemeral (wiped on every cold start
      # / redeploy), so re-running on boot simply self-heals the queue. Keep
      # ANTHROPIC_API_KEY unset so drafting uses the free templated path — with it
      # set, every cold start would re-spend on the model for the top-N languages.
      - key: LASTECHO_RUN_SWEEP_ON_STARTUP
        value: "true"
      # Don't publish /docs, /redoc, /openapi.json (the admin/triage surface) to
      # anonymous users in production. Also enables HSTS (see main.py).
      - key: LASTECHO_EXPOSE_DOCS
        value: "false"
