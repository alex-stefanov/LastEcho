# Fly.io app config. App name must be globally unique — `fly launch` will
# offer to rename this on first deploy if "lastecho-api" is taken.
app = "lastecho-api"
primary_region = "fra"

[build]

[env]
PORT = "8000"

[[mounts]]
source = "lastecho_data"
destination = "/data"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
